    function showMobileMenu() {
        var mobileNav = document.getElementById("mobile-nav");
        var mobileMenuButton= document.getElementById("moblie-menu-btn");

        if (mobileNav.style.display === "block") {
            mobileNav.style.display = "none";
            mobileMenuButton.removeAttribute("fa fa-times")
            mobileMenuButton.setAttribute("class", "fa fa-bars fa-2x")
        } else {
            mobileNav.style.display = "block";
            mobileMenuButton.removeAttribute("fa fa-bars")
            mobileMenuButton.setAttribute("class", "fa fa-times fa-2x")
        }
    }

    document.onscroll = function() {
        var mobileMenuButtonx = document.getElementById("moblie-menu-btn");
        var mobileNav = document.getElementById("mobile-nav") ;

        mobileMenuButtonx.removeAttribute("fa fa-times");
        mobileMenuButtonx.setAttribute("class", "fa fa-bars fa-2x");

        mobileNav.style.display = "none"};
      
   </script>
